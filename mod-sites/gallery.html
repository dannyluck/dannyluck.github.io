<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="header">
                <h2>Kiko welcomes you to the community gallery 🖼️</h2>
                <p><i>click the image to fullscreen</i></p>
            </div>
            <div class="pictures">
                <div class="picture">
                    <i><a href="hoa.html">Horn of Africa</a></i>
                    <img src="../images/hoa-image1.png">
                </div>

                <div class="picture">
                    <i><a href="otgr.html">Off the Grid - Russia</a></i>
                    <img src="../images/otgr-image1.png">
                </div>
            </div>
    </main>
        <footer>
            <div class="footer=text">
                <p>made by h1sora with ❤️ <a href="../index.html"> ↩️ go back</a></p>
            </div>
        </footer>
    </div>
    <div id="fullpage" onclick="this.style.display='none';"></div>
</body>
<style>
    .header {
        margin-bottom: 20px;
    }

    #fullpage {
        display: none;
        position: absolute;
        z-index: 9999;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-size: contain;
        background-repeat: no-repeat no-repeat;
        background-position: center center;
        background-color: rgba(0, 0, 0, 0.594);
    }

    body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: -moz-hidden-unscrollable;
            margin-bottom: 0px;
        }

    main {
        flex: 1;
    }

    footer {
        margin-bottom: 25px;
        margin-top: 1px;
    }

</style>
<script>
    function getPics() {} //just for this demo
            const imgs = document.querySelectorAll('.picture img');
            const fullPage = document.querySelector('#fullpage');

            imgs.forEach(img => {
            img.addEventListener('click', function() {
                fullPage.style.backgroundImage = 'url(' + img.src + ')';
                fullPage.style.display = 'block';
            });
        });
</script>
</html>
